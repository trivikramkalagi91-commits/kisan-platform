services:
  - type: web
    name: kisan-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATA_GOV_API_KEY
        sync: false # User will provide securely in Render dashboard

  - type: web
    name: kisan-ai-api
    env: python
    plan: free
    rootDir: crop_health_api
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: GEMINI_API_KEY
        sync: false # User will provide securely in Render dashboard
